<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AITSP | Launch Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2332;
  --border:#1e2d3d;--border2:#2a3a4d;
  --text:#c8d6e5;--text2:#8899aa;--text3:#556677;
  --accent:#00d4ff;--accent2:#0099cc;--accent3:#006688;
  --danger:#ff4757;--warn:#ffaa00;--success:#00e676;--purple:#a855f7;
  --glow:0 0 20px rgba(0,212,255,.15);
  --font-mono:'JetBrains Mono',monospace;
  --font-ui:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui)}

.container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;overflow:hidden}

/* Grid background */
.container::before{content:'';position:absolute;inset:0;background-image:
  linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none}

/* Radial glow */
.container::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,255,.06) 0%,transparent 70%);pointer-events:none}

.logo-section{text-align:center;margin-bottom:60px;position:relative;z-index:1}
.logo-icon{margin-bottom:20px}
.logo-icon svg{width:64px;height:64px;color:var(--accent);filter:drop-shadow(0 0 20px rgba(0,212,255,.3))}
.logo-title{font-size:42px;font-weight:700;letter-spacing:8px;font-family:var(--font-mono);color:var(--accent);margin-bottom:8px;text-shadow:0 0 30px rgba(0,212,255,.2)}
.logo-subtitle{font-size:13px;font-family:var(--font-mono);color:var(--text3);letter-spacing:4px;text-transform:uppercase}
.logo-version{font-size:10px;font-family:var(--font-mono);color:var(--text3);margin-top:12px;opacity:.5}

/* Launch button */
.launch-btn{position:relative;z-index:1;padding:18px 60px;font-size:15px;font-family:var(--font-mono);font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--accent);background:rgba(0,212,255,.05);border:1.5px solid var(--accent3);border-radius:6px;cursor:pointer;transition:all .4s;overflow:hidden}
.launch-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.1),transparent,rgba(0,212,255,.05));opacity:0;transition:opacity .4s}
.launch-btn:hover{border-color:var(--accent);box-shadow:0 0 40px rgba(0,212,255,.15),inset 0 0 40px rgba(0,212,255,.05);transform:translateY(-2px)}
.launch-btn:hover::before{opacity:1}
.launch-btn:active{transform:translateY(0);box-shadow:0 0 20px rgba(0,212,255,.1)}

/* Loading state */
.loading-section{position:relative;z-index:1;display:none;flex-direction:column;align-items:center;gap:24px;margin-top:60px}
.loading-section.active{display:flex}

.progress-track{width:400px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;position:relative}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent3),var(--accent));border-radius:2px;transition:width .15s linear;box-shadow:0 0 10px rgba(0,212,255,.4)}

.loading-text{font-size:11px;font-family:var(--font-mono);color:var(--text3);letter-spacing:2px;text-transform:uppercase;min-height:16px}

.loading-percent{font-size:28px;font-weight:700;font-family:var(--font-mono);color:var(--accent)}

.loading-details{display:flex;gap:24px;font-size:9px;font-family:var(--font-mono);color:var(--text3)}
.loading-details span b{color:var(--text2);margin-left:4px}

/* Scan line */
.scan-line{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;animation:none;pointer-events:none;z-index:10}
.scan-line.active{opacity:.12;animation:scan 3s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}

/* Status items at bottom */
.status-bar{position:absolute;bottom:24px;display:flex;gap:20px;font-size:10px;font-family:var(--font-mono);color:var(--text3);z-index:1}
.status-bar .dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.dot-green{background:var(--success)}
.dot-yellow{background:var(--warn)}
.dot-red{background:var(--danger)}

/* Fade out */
.container.fade-out{animation:fadeOut .6s ease forwards}
@keyframes fadeOut{to{opacity:0}}
</style>
</head>
<body>
<div class="container" id="main">
  <div class="scan-line" id="scanLine"></div>

  <div class="logo-section" id="logoSection">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
        <line x1="12" y1="22" x2="12" y2="15.5"/>
        <line x1="22" y1="8.5" x2="12" y2="15.5"/>
        <line x1="2" y1="8.5" x2="12" y2="15.5"/>
      </svg>
    </div>
    <div class="logo-title">AITSP</div>
    <div class="logo-subtitle">Tactical Simulation Platform</div>
    <div class="logo-version">v2.4.1 | AI-Powered Decision Training System</div>
  </div>

  <button class="launch-btn" id="launchBtn" onclick="startLoading()">
    Charger la Simulation
  </button>

  <div class="loading-section" id="loadingSection">
    <div class="loading-percent" id="loadingPercent">0%</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="loading-text" id="loadingText">Initialisation...</div>
    <div class="loading-details">
      <span><span class="dot dot-green"></span>ENGINE<b>UE5</b></span>
      <span><span class="dot dot-green"></span>MARL<b>MAPPO v3.2</b></span>
      <span><span class="dot dot-yellow"></span>BIOMETRICS<b>SYNC</b></span>
      <span><span class="dot dot-green"></span>CLOUD<b>OVH FR</b></span>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="dot dot-green"></span> Systeme Operationnel</span>
    <span>|</span>
    <span>GPU: RTX 4090 Ready</span>
    <span>|</span>
    <span>Latence: 4.2ms</span>
    <span>|</span>
    <span>Cloud Souverain OVH</span>
  </div>
</div>

<script>
const loadingSteps = [
  {at:0,  text:"Initialisation du moteur de simulation..."},
  {at:8,  text:"Chargement des assets 3D — Terrain montagneux..."},
  {at:18, text:"Compilation des shaders environnementaux..."},
  {at:28, text:"Deploiement des agents MARL (MAPPO, QMIX)..."},
  {at:38, text:"Calibration de l'AI Scenario Director..."},
  {at:48, text:"Synchronisation des capteurs biometriques..."},
  {at:58, text:"Generation du scenario — Op. GRANITE SHADOW..."},
  {at:68, text:"Chargement du brouillard de guerre..."},
  {at:78, text:"Initialisation du feedback cognitif temps reel..."},
  {at:88, text:"Verification des communications tactiques..."},
  {at:95, text:"Finalisation — Tous systemes nominaux..."},
];

function startLoading() {
  const btn = document.getElementById("launchBtn");
  const loadingSection = document.getElementById("loadingSection");
  const scanLine = document.getElementById("scanLine");

  btn.style.display = "none";
  loadingSection.classList.add("active");
  scanLine.classList.add("active");

  let progress = 0;
  const duration = 5500;
  const interval = 30;
  const increment = 100 / (duration / interval);
  let stepIdx = 0;

  const timer = setInterval(() => {
    progress = Math.min(progress + increment * (0.6 + Math.random() * 0.8), 100);
    const p = Math.floor(progress);

    document.getElementById("progressFill").style.width = p + "%";
    document.getElementById("loadingPercent").textContent = p + "%";

    while (stepIdx < loadingSteps.length && p >= loadingSteps[stepIdx].at) {
      document.getElementById("loadingText").textContent = loadingSteps[stepIdx].text;
      stepIdx++;
    }

    if (p >= 100) {
      clearInterval(timer);
      document.getElementById("loadingText").textContent = "Simulation prete — Lancement...";
      document.getElementById("loadingPercent").style.color = "var(--success)";

      setTimeout(() => {
        document.getElementById("main").classList.add("fade-out");
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 600);
      }, 800);
    }
  }, interval);
}
</script>
</body>
</html>
